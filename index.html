<!DOCTYPE html>
<html>
<head>
  <title>Omkar Kirdavkar | Notes App</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

 <div class="container">
  <h1>Notes App</h1>

      id="noteInput"

</body>
</html>
